name: Build BHTwitter

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 检出代码
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          submodules: true

      # 检查和准备缓存
      - name: Check cache
        run: |
          echo upstream_heads=`git ls-remote https://github.com/roothide/theos | head -n 1 | cut -f 1`-`git ls-remote https://github.com/theos/sdks | head -n 1 | cut -f 1` >> $GITHUB_ENV

      - name: Use cache
        id: cache
        uses: actions/cache@v4.2.1
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-${{ env.upstream_heads }}

      # 准备 Theos 环境
      - name: Prepare Theos
        uses: huami1314/theos-action@main

      # 更新 SDK
      - name: Update SDK
        run: |
          XCODE_PATH=$(xcode-select -p)
          SDK_PATH="$XCODE_PATH/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk"
          THEOS_SDK_PATH="$THEOS/sdks/iPhoneOS.sdk"
          mkdir -p "$THEOS_SDK_PATH/System/Library/Frameworks"
          cp -R "$SDK_PATH/System/Library/Frameworks/Preferences.framework" "$THEOS_SDK_PATH/System/Library/Frameworks/"

      # 设置 GNU Make
      - name: Setup GNU Make
        run: |
          echo "$(brew --prefix)/opt/make/libexec/gnubin" >> $GITHUB_PATH

      # 构建和打包
      - name: Build and Package
        run: |
          rm -f packages/*
          make clean
          make package FINALPACKAGE=1 -j$(sysctl -n hw.ncpu)

      # 上传生成的 DEB 包
      - name: Upload Deb package
        uses: actions/upload-artifact@v4.6.0
        with:
          name: BHTwitter-Deb
          path: ${{ github.workspace }}/packages/*.deb
