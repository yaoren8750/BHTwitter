name: build deb

on: 
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 检出代码
      - uses: actions/checkout@v4.2.2
        with:
          submodules: true

      # 检查缓存
      - name: Check cache
        run: |
          echo upstream_heads=`git ls-remote https://github.com/roothide/theos | head -n 1 | cut -f 1`-`git ls-remote https://github.com/theos/sdks | head -n 1 | cut -f 1` >> $GITHUB_ENV

      # 使用缓存
      - name: Use cache
        id: cache
        uses: actions/cache@v4.2.1
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-${{ env.upstream_heads }}

      # 准备 Theos 环境
      - name: Prepare Theos
        uses: huami1314/theos-action@main

      # 更新 SDK
      - name: Update SDK
        run: |
          XCODE_PATH=$(xcode-select -p)
SDK_PATH="$XCODE_PATH/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk"
THEOS_SDK_PATH="/Users/runner/work/BHTwitter/BHTwitter/theos/sdks/iPhoneOS.sdk"

if [ ! -d "$THEOS_SDK_PATH" ]; then
  echo "Copying SDK from Xcode to Theos..."
  mkdir -p "/Users/runner/work/BHTwitter/BHTwitter/theos/sdks"
  cp -R "$SDK_PATH" "$THEOS_SDK_PATH"
else
  echo "SDK already exists in Theos."
fi
